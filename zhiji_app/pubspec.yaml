name: zhiji
description: "知记 — AI 原生个人知识管理应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.0

  # 数据持久化
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # 安全存储
  flutter_secure_storage: ^9.2.0

  # 网络
  dio: ^5.7.0

  # 数据模型
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # UI
  flutter_markdown: ^0.7.0
  google_fonts: ^6.2.1

  # 文件
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  image_picker: ^1.1.0
  open_filex: ^4.6.0

  # 语音输入
  speech_to_text: ^7.0.0

  # 图表与可视化
  fl_chart: ^0.69.0

  # 运行时权限
  permission_handler: ^11.3.0

  # 应用锁 / 生物识别
  local_auth: ^2.3.0

  # 工具
  intl: ^0.19.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

  # 代码生成
  build_runner: ^2.4.0
  drift_dev: ^2.21.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
